services:

    # PHP Service
    gym-app:
        image: ${DOCKERHUB_USERNAME}/gym-erp:latest
        container_name: gym-app
        restart: always
        env_file: ./.env
        environment:
            SERVICE_NAME: app
            SERVICE_TAGS: prod
        working_dir: /var/www/default
        volumes:
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
            - storage_data:/var/www/default/storage
            - public_data:/var/www/default/public
        networks:
            - gym-app-network
        depends_on:
            - gym-db
            - gym-redis

    # PostgreSQL Service
    gym-db:
        image: postgres:16.1
        container_name: gym-db
        restart: always
        environment:
            PGPASSWORD: '${DB_PASSWORD}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - gym-app-network

    # Nginx Service
    gym-webserver:
        image: nginx:alpine
        container_name: gym-webserver
        restart: always
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./docker/nginx/conf.d/:/etc/nginx/conf.d/
            - ./docker/nginx/logs:/var/log/nginx
            - public_data:/var/www/default/public:ro
            - storage_data:/var/www/default/storage:ro
            - certbot_www:/var/www/certbot:ro
            - certbot_conf:/etc/letsencrypt:ro
        networks:
            - gym-app-network
        depends_on:
            - gym-app

    # Queue Worker
    gym-worker:
        image: ${DOCKERHUB_USERNAME}/gym-erp:latest
        container_name: gym-worker
        restart: always
        env_file: ./.env
        working_dir: /var/www/default
        volumes:
            - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
            - storage_data:/var/www/default/storage
        command: php artisan queue:work --queue=default --sleep=1 --tries=3 --timeout=120
        networks:
            - gym-app-network
        depends_on:
            - gym-app
            - gym-db
            - gym-redis

    # Redis Service
    gym-redis:
        image: redis:7-alpine
        container_name: gym-redis
        restart: always
        networks:
            - gym-app-network

    # Certbot — получение и обновление SSL сертификатов
    certbot:
        image: certbot/certbot:latest
        container_name: gym-certbot
        volumes:
            - certbot_www:/var/www/certbot
            - certbot_conf:/etc/letsencrypt
        networks:
            - gym-app-network
        entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"


# Networks
networks:
    gym-app-network:
        driver: bridge

# Volumes
volumes:
    pgdata:
        driver: local
    storage_data:
        driver: local
    public_data:
        driver: local
    certbot_www:
        driver: local
    certbot_conf:
        driver: local
