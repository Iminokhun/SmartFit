name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  # ═══════════════════════════════════
  # JOB 1: Lint
  # ═══════════════════════════════════
  lint:
    name: Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Add Flux credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Prepare environment
        run: |
          mkdir -p bootstrap/cache
          cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --optimize-autoloader --no-interaction

      - name: Generate app key
        run: php artisan key:generate

      - name: Run Pint
        run: vendor/bin/pint --test

  # ═══════════════════════════════════
  # JOB 2: Tests
  # ═══════════════════════════════════
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, pcntl, intl, gd, zip, soap
          coverage: none

      - name: Add Flux credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Prepare environment
        run: |
          mkdir -p bootstrap/cache
          cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --optimize-autoloader --no-interaction

      - name: Generate app key
        run: php artisan key:generate

      - name: Run tests
        run: php artisan test

  # ═══════════════════════════════════
  # JOB 3: Build & Push Docker Image
  # ═══════════════════════════════════
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/gym-erp
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            FLUX_USERNAME=${{ secrets.FLUX_USERNAME }}
            FLUX_LICENSE_KEY=${{ secrets.FLUX_LICENSE_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ═══════════════════════════════════
  # JOB 4: Deploy to GCP server
  # ═══════════════════════════════════
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/gym_erp/gym_erp

            echo "==> Pulling latest config..."
            git pull

            echo "==> Logging into Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "==> Pulling new image..."
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose.prod.yml pull gym-app

            echo "==> Restarting app containers..."
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} docker compose -f docker-compose.prod.yml up -d --force-recreate gym-app gym-worker

            echo "==> Waiting for app to be ready..."
            sleep 5

            echo "==> Running migrations..."
            docker compose -f docker-compose.prod.yml exec -T gym-app php artisan migrate --force

            echo "==> Clearing and warming cache..."
            docker compose -f docker-compose.prod.yml exec -T gym-app php artisan optimize:clear
            docker compose -f docker-compose.prod.yml exec -T gym-app php artisan optimize

            echo "==> Deploy complete!"
