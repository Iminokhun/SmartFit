# ═══════════════════════════════════════════
# HTTP → HTTPS редирект + Certbot challenge
# ═══════════════════════════════════════════
server {
    listen 80;
    server_name smartfit.uz www.smartfit.uz;

    # Certbot использует этот путь для верификации домена
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное → редирект на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ═══════════════════════════════════════════
# HTTPS — основной сервер
# ═══════════════════════════════════════════
server {
    listen 443 ssl;
    http2 on;
    server_name smartfit.uz www.smartfit.uz;

    # SSL сертификаты от Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/smartfit.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smartfit.uz/privkey.pem;

    # Настройки SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS — браузер запоминает что сайт только HTTPS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Заголовки безопасности
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /var/www/default/public;
    index index.php;

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    client_max_body_size 120M;

    # Static files — Nginx отдаёт напрямую без PHP
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel assets (Vite build)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Storage (загруженные файлы)
    location /storage/ {
        try_files $uri =404;
    }

    # PHP запросы → PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass gym-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Laravel роутинг
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }
}
