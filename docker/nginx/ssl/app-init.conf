# ═══════════════════════════════════════════
# ВРЕМЕННЫЙ конфиг — только для первого
# получения SSL сертификата через Certbot.
#
# Использовать ДО получения сертификата:
#   1. Переименовать app.conf → app.conf.bak
#   2. Переименовать app-init.conf → app.conf
#   3. docker compose up -d gym-webserver
#   4. Выполнить certbot (см. deploy.sh)
#   5. Вернуть оригинальный app.conf
# ═══════════════════════════════════════════
server {
    listen 80;
    server_name qoyilmaqom.uz;

    # Certbot верификация домена
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
